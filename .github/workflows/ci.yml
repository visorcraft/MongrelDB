name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: 2
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-targets: false
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: python3 scripts/verify-component-versions
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-server
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-server
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test --all-targets --all-features

  # HTTP client crate (standalone - own workspace). The retention contract
  # tests use wiremock to assert exact method/path/body/response shapes.
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-client
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-client
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features

  cross-platform:
    name: Architecture tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
      - if: runner.os == 'macOS'
        run: brew install protobuf
      - if: runner.os == 'Windows'
        run: choco install protoc --yes --no-progress
      - run: cargo test --workspace --all-features
      - run: cargo test --manifest-path crates/mongreldb-server/Cargo.toml --all-targets --all-features
      - run: cargo test --manifest-path crates/mongreldb-client/Cargo.toml --all-targets --all-features

  mysql-wire:
    name: MySQL wire external-client compatibility
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-mysql-wire
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-mysql-wire
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets

  mysql-migration:
    name: Real MySQL snapshot and binlog migration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-migrate-mysql
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-migrate-mysql
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Start TLS MySQL 8.4 source
        working-directory: .
        run: bash scripts/start-test-mysql.sh
      - run: cargo clippy --all-targets -- -D warnings
      - name: Run real source integration
        env:
          MONGRELDB_TEST_MYSQL_HOST: localhost
          MONGRELDB_TEST_MYSQL_PORT: "33060"
          MONGRELDB_TEST_MYSQL_PASSWORD: mongreldb-test
          MONGRELDB_TEST_MYSQL_CA: ${{ github.workspace }}/target/mysql-tls/ca.pem
        run: cargo test --test mysql_container -- --nocapture

  fuzz:
    name: Parser fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: fuzz
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo install cargo-fuzz --locked
      - name: Fuzz five trust boundaries
        working-directory: fuzz
        run: |
          for target in protocol_envelope wal consensus_snapshot cursor_token sql_adapter_packet; do
            cargo fuzz run "$target" -- -max_total_time=10
          done

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-node
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-node
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: npm test

  # C ABI crate (standalone - own workspace). The FFI builds as a cdylib +
  # staticlib and is exercised by Rust round-trip tests plus a C smoke test
  # compiled with cc. This keeps the ABI from bit-rotting between releases.
  ffi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-ffi
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-ffi
      # Build the release cdylib first so the C smoke test can link it.
      - run: cargo build --release
      - run: cargo test --release
      - run: MONGRELDB_C_SANITIZE=1 cargo test --release --test c_smoke_test

  # Kit FFI crate (standalone - own workspace). Same pattern: cdylib +
  # staticlib, Rust round-trip tests + C smoke test.
  kit-ffi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-kit-ffi
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-kit-ffi
      - run: cargo build --release
      - run: cargo test --release

  # JNI shim crate (standalone - own workspace). Builds as a cdylib loaded
  # by the JVM. Compile-check only (no JVM round-trip in CI yet).
  jni:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-jni
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-jni
      - run: cargo build --release

  qualification:
    name: Clean release qualification
    needs: cross-platform
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}
    permissions:
      contents: write
    env:
      QUAL_DIR: /tmp/mongreldb-qualification
      # Keep the target on the main volume (not a tiny /tmp tmpfs) and shrink
      # debug artifacts — this job sequentially builds workspace + server +
      # client + FFI and otherwise OOMs the runner disk ("No space left on device").
      CARGO_TARGET_DIR: ${{ github.workspace }}/target-qualification
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "line-tables-only"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v7
      - name: Free disk space
        run: |
          # Drop unused hosted-image toolchains so Arrow/DataFusion debug
          # builds have room. Safe no-ops if a path is already gone.
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell \
            /usr/share/swift || true
          sudo docker system prune -af || true
          df -h
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Capture source identity
        run: |
          mkdir -p "$QUAL_DIR"
          git status --porcelain > "$QUAL_DIR/git-status.txt"
          {
            git rev-parse HEAD
            rustc --version
            cargo --version
            node --version
            df -h
          } > "$QUAL_DIR/versions.txt"
      - name: Root format
        run: python3 scripts/run-certification-command.py "$QUAL_DIR/cargo-fmt.log" cargo fmt --all -- --check
      - name: Component versions
        run: python3 scripts/run-certification-command.py "$QUAL_DIR/component-versions.log" python3 scripts/verify-component-versions
      - name: Root clippy
        run: python3 scripts/run-certification-command.py "$QUAL_DIR/cargo-clippy.log" cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Root tests
        run: python3 scripts/run-certification-command.py "$QUAL_DIR/cargo-test.log" cargo test --workspace --all-features
      - name: Root release tests
        run: python3 scripts/run-certification-command.py "$QUAL_DIR/cargo-test-release.log" cargo test --workspace --release --all-features
      - name: Reclaim debug intermediates
        # Drop incremental-style leftovers and large debug deps after the
        # workspace suite; later steps still rebuild what they need.
        run: |
          rm -rf "$CARGO_TARGET_DIR/debug/incremental" \
                 "$CARGO_TARGET_DIR/debug/examples" \
                 "$CARGO_TARGET_DIR/debug/build" || true
          df -h
      - name: Server tests
        run: |
          cargo clippy --manifest-path crates/mongreldb-server/Cargo.toml --all-targets --all-features -- -D warnings 2>&1 | tee "$QUAL_DIR/server-clippy.log"
          python3 scripts/run-certification-command.py "$QUAL_DIR/server-test.log" cargo test --manifest-path crates/mongreldb-server/Cargo.toml --all-targets --all-features
      - name: Client checks
        run: |
          cargo clippy --manifest-path crates/mongreldb-client/Cargo.toml --all-targets --all-features -- -D warnings 2>&1 | tee "$QUAL_DIR/client-clippy.log"
          python3 scripts/run-certification-command.py "$QUAL_DIR/client-test.log" cargo test --manifest-path crates/mongreldb-client/Cargo.toml --all-targets --all-features
      - name: MySQL wire checks
        run: |
          cargo clippy --manifest-path crates/mongreldb-mysql-wire/Cargo.toml --all-targets -- -D warnings 2>&1 | tee "$QUAL_DIR/mysql-wire-clippy.log"
          python3 scripts/run-certification-command.py "$QUAL_DIR/mysql-wire-test.log" cargo test --manifest-path crates/mongreldb-mysql-wire/Cargo.toml --all-targets
      - name: Real MySQL migration checks
        env:
          MONGRELDB_TEST_MYSQL_HOST: localhost
          MONGRELDB_TEST_MYSQL_PORT: "33060"
          MONGRELDB_TEST_MYSQL_PASSWORD: mongreldb-test
          MONGRELDB_TEST_MYSQL_CA: ${{ github.workspace }}/target/mysql-tls/ca.pem
        run: |
          bash scripts/start-test-mysql.sh 2>&1 | tee "$QUAL_DIR/mysql-container-start.log"
          cargo clippy --manifest-path crates/mongreldb-migrate-mysql/Cargo.toml --all-targets -- -D warnings 2>&1 | tee "$QUAL_DIR/mysql-migrate-clippy.log"
          python3 scripts/run-certification-command.py "$QUAL_DIR/mysql-migrate-test.log" cargo test --manifest-path crates/mongreldb-migrate-mysql/Cargo.toml --test mysql_container -- --nocapture
      - name: Node checks
        working-directory: crates/mongreldb-node
        run: |
          npm ci 2>&1 | tee "$QUAL_DIR/node-ci.log"
          npm run build 2>&1 | tee "$QUAL_DIR/node-build.log"
          python3 "$GITHUB_WORKSPACE/scripts/run-certification-command.py" "$QUAL_DIR/node-test.log" npm test
          python3 "$GITHUB_WORKSPACE/scripts/run-certification-command.py" "$QUAL_DIR/node-smoke.log" node smoke.mjs
      - name: Reclaim before release FFI builds
        run: |
          # Release FFI builds need headroom; drop the debug tree now that
          # clippy/tests finished.
          rm -rf "$CARGO_TARGET_DIR/debug" || true
          df -h
      - name: FFI checks
        run: |
          cargo build --manifest-path crates/mongreldb-ffi/Cargo.toml --release 2>&1 | tee "$QUAL_DIR/ffi-build.log"
          python3 scripts/run-certification-command.py "$QUAL_DIR/ffi-test.log" cargo test --manifest-path crates/mongreldb-ffi/Cargo.toml --release
          python3 scripts/run-certification-command.py "$QUAL_DIR/ffi-sanitizer.log" env MONGRELDB_C_SANITIZE=1 cargo test --manifest-path crates/mongreldb-ffi/Cargo.toml --release --test c_smoke_test
          cargo build --manifest-path crates/mongreldb-kit-ffi/Cargo.toml --release 2>&1 | tee "$QUAL_DIR/kit-ffi-build.log"
          python3 scripts/run-certification-command.py "$QUAL_DIR/kit-ffi-test.log" cargo test --manifest-path crates/mongreldb-kit-ffi/Cargo.toml --release
          python3 scripts/run-certification-command.py "$QUAL_DIR/jni-build.log" cargo build --manifest-path crates/mongreldb-jni/Cargo.toml --release
      - name: Python MinHash wire fixture
        run: |
          cargo build --manifest-path crates/mongreldb-server/Cargo.toml --release > "$QUAL_DIR/ai-wire-server.log" 2>&1
          "$CARGO_TARGET_DIR/release/mongreldb-server" "$RUNNER_TEMP/mongreldb-ai-wire" --port 8080 >> "$QUAL_DIR/ai-wire-server.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for _ in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8080/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:8080/health >/dev/null
          PYTHONDONTWRITEBYTECODE=1 MONGRELDB_DB_PATH="$RUNNER_TEMP/mongreldb-ai-wire" python3 tools/ai-wire/demo_minhash.py 2>&1 | tee "$QUAL_DIR/ai-wire-minhash.log"
      - name: AI benchmark
        run: |
          MONGRELDB_AI_QUALIFICATION=1 \
            MONGRELDB_AI_BENCH_ROWS=100000 MONGRELDB_AI_BENCH_QUERIES=50 \
            cargo run -p mongreldb-core --release --all-features \
            --example ai_retrieval_bench \
            > "$QUAL_DIR/ai-benchmark-100k.json" 2> "$QUAL_DIR/ai-benchmark-100k.log"
          cp docs/ai/ci-benchmark-thresholds.json "$QUAL_DIR/"
          python3 scripts/run-certification-command.py "$QUAL_DIR/ai-benchmark-validation.log" \
            python3 scripts/validate-ai-benchmark.py \
            "$QUAL_DIR/ai-benchmark-100k.json" \
            docs/ai/ci-benchmark-thresholds.json \
            --expected-sha "$GITHUB_SHA"
          MONGRELDB_AI_CONCURRENCY_ROWS=10000 MONGRELDB_AI_CONCURRENCY_OPS=25 \
            cargo run -p mongreldb-core --release --all-features \
            --example ai_concurrency_bench \
            > "$QUAL_DIR/ai-concurrency.json" 2> "$QUAL_DIR/ai-concurrency.log"
          python3 scripts/run-certification-command.py "$QUAL_DIR/ai-concurrency-validation.log" \
            python3 scripts/validate-ai-concurrency.py "$QUAL_DIR/ai-concurrency.json"
          test -z "$(git status --porcelain)"
      - name: Fuzz smoke
        run: |
          rustup toolchain install nightly --profile minimal
          cargo install cargo-fuzz --locked
          # shellcheck disable=SC2016
          python3 scripts/run-certification-command.py "$QUAL_DIR/fuzz-smoke.log" \
            bash -c 'cd fuzz && for target in protocol_envelope wal consensus_snapshot cursor_token sql_adapter_packet; do cargo +nightly fuzz run "$target" -- -max_total_time=10; done'
      - name: Crash recovery matrix
        run: python3 scripts/run-certification-command.py "$QUAL_DIR/crash-matrix.log" cargo test -p mongreldb-core --test fault_injection --test crash --test crash_process
      - name: Create certification manifest
        run: |
          tar \
            --exclude=deps --exclude=build --exclude=incremental --exclude=examples \
            -C "$CARGO_TARGET_DIR/release" \
            -czf "$QUAL_DIR/qualified-artifacts.tar.gz" .
          python3 scripts/run-certification-command.py "$QUAL_DIR/packaged-artifact-test.log" \
            bash scripts/qualify-packaged-artifacts.sh "$QUAL_DIR/qualified-artifacts.tar.gz" "$GITHUB_WORKSPACE"
          python3 scripts/generate-certification-manifest.py \
            --evidence-dir "$QUAL_DIR" \
            --artifact "$QUAL_DIR/qualified-artifacts.tar.gz" \
            --output "$QUAL_DIR/certification-manifest.json" \
            --commit "$GITHUB_SHA"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mongreldb-clean-qualification-${{ github.sha }}
          path: |
            /tmp/mongreldb-qualification/
      - name: Package release evidence
        if: startsWith(github.ref, 'refs/tags/v')
        run: tar -C "$QUAL_DIR" -czf /tmp/mongreldb-clean-qualification.tar.gz .
      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: /tmp/mongreldb-clean-qualification.tar.gz
