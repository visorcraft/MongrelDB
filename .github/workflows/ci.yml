name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_VERSION: "1.97.1"

jobs:
  rust:
    name: Core and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: python3 scripts/verify-component-versions
      - run: cargo fmt --check
      # Exclude mongreldb-perf: bundled DuckDB debug builds exhaust runner disk.
      - run: cargo clippy --workspace --all-targets --all-features --exclude mongreldb-perf -- -D warnings
      - run: cargo test -p mongreldb-core --all-features

  workspace-tests:
    name: Other workspace tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2.9.1
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # mongreldb-perf is a benchmark harness with bundled DuckDB/SQLite C++
      # deps; building it in debug OOMs GitHub-hosted runners ("No space left
      # on device"). It has no unit tests — run via `cargo run -p mongreldb-perf`
      # when benchmarking.
      - run: cargo test --workspace --all-features --exclude mongreldb-core --exclude mongreldb-perf

  server:
    name: Server tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-server
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-server
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test --all-targets --all-features

  client:
    name: Client checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-client
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-client
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features

  mysql-wire:
    name: MySQL wire compatibility
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-mysql-wire
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-mysql-wire
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets

  windows-smoke:
    name: Windows portability smoke
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2.9.1
      - run: choco install protoc --yes --no-progress
      - run: cargo test -p mongreldb-core --all-features --test file_lock --test cross_process_lock --test spill
