name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: 2
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-targets: false
      - run: python3 scripts/verify-component-versions
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-server
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-server
      - run: cargo test --all-targets --all-features

  # HTTP client crate (standalone - own workspace). The retention contract
  # tests use wiremock to assert exact method/path/body/response shapes.
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-client
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-client
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-node
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-node
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: npm test

  # C ABI crate (standalone - own workspace). The FFI builds as a cdylib +
  # staticlib and is exercised by Rust round-trip tests plus a C smoke test
  # compiled with cc. This keeps the ABI from bit-rotting between releases.
  ffi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-ffi
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-ffi
      # Build the release cdylib first so the C smoke test can link it.
      - run: cargo build --release
      - run: cargo test --release
      - run: MONGRELDB_C_SANITIZE=1 cargo test --release --test c_smoke_test

  # Kit FFI crate (standalone - own workspace). Same pattern: cdylib +
  # staticlib, Rust round-trip tests + C smoke test.
  kit-ffi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-kit-ffi
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-kit-ffi
      - run: cargo build --release
      - run: cargo test --release

  # JNI shim crate (standalone - own workspace). Builds as a cdylib loaded
  # by the JVM. Compile-check only (no JVM round-trip in CI yet).
  jni:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-jni
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-jni
      - run: cargo build --release

  qualification:
    name: Clean release qualification
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}
    permissions:
      contents: write
    env:
      QUAL_DIR: /tmp/mongreldb-qualification
      CARGO_TARGET_DIR: /tmp/mongreldb-qualification-target
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Capture source identity
        run: |
          mkdir -p "$QUAL_DIR"
          git status --porcelain > "$QUAL_DIR/git-status.txt"
          {
            git rev-parse HEAD
            rustc --version
            cargo --version
            node --version
          } > "$QUAL_DIR/versions.txt"
      - name: Root format
        run: cargo fmt --check 2>&1 | tee "$QUAL_DIR/cargo-fmt.log"
      - name: Root clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | tee "$QUAL_DIR/cargo-clippy.log"
      - name: Root tests
        run: cargo test --workspace --all-features 2>&1 | tee "$QUAL_DIR/cargo-test.log"
      - name: Server tests
        run: |
          cargo clippy --manifest-path crates/mongreldb-server/Cargo.toml --all-targets --all-features -- -D warnings 2>&1 | tee "$QUAL_DIR/server-clippy.log"
          cargo test --manifest-path crates/mongreldb-server/Cargo.toml --all-targets --all-features 2>&1 | tee "$QUAL_DIR/server-test.log"
      - name: Client checks
        run: |
          cargo clippy --manifest-path crates/mongreldb-client/Cargo.toml --all-targets --all-features -- -D warnings 2>&1 | tee "$QUAL_DIR/client-clippy.log"
          cargo test --manifest-path crates/mongreldb-client/Cargo.toml --all-targets --all-features 2>&1 | tee "$QUAL_DIR/client-test.log"
      - name: Node checks
        working-directory: crates/mongreldb-node
        run: |
          npm ci 2>&1 | tee "$QUAL_DIR/node-ci.log"
          npm run build 2>&1 | tee "$QUAL_DIR/node-build.log"
          npm test 2>&1 | tee "$QUAL_DIR/node-test.log"
          node smoke.mjs 2>&1 | tee "$QUAL_DIR/node-smoke.log"
      - name: FFI checks
        run: |
          cargo build --manifest-path crates/mongreldb-ffi/Cargo.toml --release 2>&1 | tee "$QUAL_DIR/ffi-build.log"
          cargo test --manifest-path crates/mongreldb-ffi/Cargo.toml --release 2>&1 | tee "$QUAL_DIR/ffi-test.log"
          MONGRELDB_C_SANITIZE=1 cargo test --manifest-path crates/mongreldb-ffi/Cargo.toml --release --test c_smoke_test 2>&1 | tee "$QUAL_DIR/ffi-sanitizer.log"
          cargo build --manifest-path crates/mongreldb-kit-ffi/Cargo.toml --release 2>&1 | tee "$QUAL_DIR/kit-ffi-build.log"
          cargo test --manifest-path crates/mongreldb-kit-ffi/Cargo.toml --release 2>&1 | tee "$QUAL_DIR/kit-ffi-test.log"
          cargo build --manifest-path crates/mongreldb-jni/Cargo.toml --release 2>&1 | tee "$QUAL_DIR/jni-build.log"
      - name: Python MinHash wire fixture
        run: |
          cargo build --manifest-path crates/mongreldb-server/Cargo.toml --release > "$QUAL_DIR/ai-wire-server.log" 2>&1
          "$CARGO_TARGET_DIR/release/mongreldb-server" "$RUNNER_TEMP/mongreldb-ai-wire" --port 8080 >> "$QUAL_DIR/ai-wire-server.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for _ in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8080/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:8080/health >/dev/null
          PYTHONDONTWRITEBYTECODE=1 MONGRELDB_DB_PATH="$RUNNER_TEMP/mongreldb-ai-wire" python3 tools/ai-wire/demo_minhash.py 2>&1 | tee "$QUAL_DIR/ai-wire-minhash.log"
      - name: AI benchmark
        run: |
          MONGRELDB_AI_QUALIFICATION=1 \
            MONGRELDB_AI_BENCH_ROWS=100000 MONGRELDB_AI_BENCH_QUERIES=50 \
            cargo run -p mongreldb-core --release --all-features \
            --example ai_retrieval_bench \
            > "$QUAL_DIR/ai-benchmark-100k.json" 2> "$QUAL_DIR/ai-benchmark-100k.log"
          cp docs/ai/ci-benchmark-thresholds.json "$QUAL_DIR/"
          python3 scripts/validate-ai-benchmark.py \
            "$QUAL_DIR/ai-benchmark-100k.json" \
            docs/ai/ci-benchmark-thresholds.json \
            --expected-sha "$GITHUB_SHA" 2>&1 \
            | tee "$QUAL_DIR/ai-benchmark-validation.log"
          MONGRELDB_AI_CONCURRENCY_ROWS=10000 MONGRELDB_AI_CONCURRENCY_OPS=25 \
            cargo run -p mongreldb-core --release --all-features \
            --example ai_concurrency_bench \
            > "$QUAL_DIR/ai-concurrency.json" 2> "$QUAL_DIR/ai-concurrency.log"
          python3 scripts/validate-ai-concurrency.py "$QUAL_DIR/ai-concurrency.json" 2>&1 | tee "$QUAL_DIR/ai-concurrency-validation.log"
          test -z "$(git status --porcelain)"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mongreldb-clean-qualification-${{ github.sha }}
          path: |
            /tmp/mongreldb-qualification/
      - name: Package release evidence
        if: startsWith(github.ref, 'refs/tags/v')
        run: tar -C "$QUAL_DIR" -czf /tmp/mongreldb-clean-qualification.tar.gz .
      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: /tmp/mongreldb-clean-qualification.tar.gz
