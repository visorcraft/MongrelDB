# Publishes Rust crates, server images, and server binaries on a tag.
# npm ships independently through npm-release.yml.
#
# Release flow: bump "version" in crates/mongreldb-node/package.json and
# workspace.package.version in Cargo.toml, commit, then tag and push the
# matching version, for example:
#   git tag v0.18.2 && git push origin master v0.18.2
# npm/crates.io both refuse to republish an existing version, so the tag must
# be a new version.
#
# Publish order is bottom-up: crates.io strips path deps at publish time, so
# each package's versioned path deps must already exist on the index.
# Foundation (types/fault/sim) → log/protocol → core → query → consensus →
# cluster → client → server. mongreldb-query ships with core (Kit SQL surface).
#
# Job graph (max parallelism, native arch runners — no QEMU):
#   wave 1 (parallel): publish-crate · image-amd64 · image-arm64
#   wave 2 (parallel): server binaries · image-manifest
# The arm64 addon .node and arm64 server image build on ubuntu-24.04-arm
# (native, free for public repos), avoiding hours of QEMU emulation.
#
# Requires repo secrets:
#   NPM_TOKEN            — granular npm token, read+write on @visorcraft
#   CARGO_REGISTRY_TOKEN — crates.io API token, publish scope
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag receiving assets (for example v0.61.1)'
        required: true
      checkout_ref:
        description: 'Git ref to build (defaults to tag)'
        required: false
        default: ''
      assets_only:
        description: 'Skip immutable registry publishing'
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

jobs:
  publish-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref || inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2.9.1

      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # Treat an existing immutable crate version as success. Retry when the
      # crates.io index has not yet observed a just-published dependency, or
      # when crates.io rate-limits new-crate publishes (HTTP 429).
      - name: Publish Rust crates
        if: ${{ !inputs.assets_only }}
        run: |
          publish_crate() {
            local attempt output wait_until now sleep_s
            for attempt in $(seq 1 60); do
              if output="$(cargo publish "$@" 2>&1)"; then
                echo "$output"
                return 0
              fi
              echo "$output"
              if echo "$output" | grep -qE 'already exists|already published'; then
                return 0
              fi
              if echo "$output" | grep -qE 'no matching package named|failed to select a version for the requirement'; then
                echo "dependency not yet on crates.io index (attempt $attempt); sleeping 20s"
                sleep 20
                continue
              fi
              if echo "$output" | grep -qE 'status 429|Too Many Requests'; then
                # Prefer the Retry-After wall-clock in the error body when present.
                wait_until="$(echo "$output" | sed -n 's/.*try again after \([^ ]* [^ ]* [^ ]* [^ ]* [^ ]*\).*/\1/p' | head -1)"
                if [ -n "$wait_until" ]; then
                  now="$(date -u +%s)"
                  sleep_s=$(( $(date -u -d "$wait_until" +%s 2>/dev/null || echo "$now") - now + 15 ))
                  if [ "$sleep_s" -lt 30 ]; then sleep_s=30; fi
                  if [ "$sleep_s" -gt 900 ]; then sleep_s=900; fi
                  echo "crates.io rate limit (attempt $attempt); sleeping ${sleep_s}s until after $wait_until"
                  sleep "$sleep_s"
                else
                  echo "crates.io rate limit (attempt $attempt); sleeping 120s"
                  sleep 120
                fi
                continue
              fi
              return 1
            done
            return 1
          }
          # Leaves first (no first-party deps).
          publish_crate -p mongreldb-types
          publish_crate -p mongreldb-fault
          publish_crate -p mongreldb-sim
          # Depend on types.
          publish_crate -p mongreldb-log
          publish_crate -p mongreldb-protocol
          # Core + query (query depends on core + types).
          publish_crate -p mongreldb-core
          publish_crate -p mongreldb-query
          # Cluster stack (consensus → cluster; both need core foundation).
          publish_crate -p mongreldb-consensus
          publish_crate -p mongreldb-cluster
          # Standalone crates (not workspace members).
          publish_crate --manifest-path crates/mongreldb-client/Cargo.toml
          publish_crate --manifest-path crates/mongreldb-server/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Each arch's server image builds natively (no QEMU), pushed under an
  # arch-suffixed tag; image-manifest merges them into the version + latest tags.
  image-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref || inputs.tag || github.ref }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ghcr.io/visorcraft/mongreldb-server:${{ inputs.tag || github.ref_name }}-amd64

  image-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref || inputs.tag || github.ref }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ghcr.io/visorcraft/mongreldb-server:${{ inputs.tag || github.ref_name }}-arm64

  image-manifest:
    needs: [image-amd64, image-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          docker buildx imagetools create \
            -t ghcr.io/visorcraft/mongreldb-server:${{ inputs.tag || github.ref_name }} \
            -t ghcr.io/visorcraft/mongreldb-server:latest \
            ghcr.io/visorcraft/mongreldb-server:${{ inputs.tag || github.ref_name }}-amd64 \
            ghcr.io/visorcraft/mongreldb-server:${{ inputs.tag || github.ref_name }}-arm64

  release-linux-binaries:
    needs: publish-crate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset: mongreldb-server-linux-x64
            apt: ''
            linker: ''
            ar: ''
          - target: x86_64-unknown-linux-musl
            asset: mongreldb-server-linux-x64-musl
            apt: musl-tools
            linker: ''
            ar: ''
          - target: aarch64-unknown-linux-gnu
            asset: mongreldb-server-linux-arm64
            apt: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
            ar: aarch64-linux-gnu-ar
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref || inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-server

      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler ${{ matrix.apt }}

      - run: cargo build --release --bin mongreldb-server --target ${{ matrix.target }}
        working-directory: crates/mongreldb-server
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.linker }}
          AR_aarch64_unknown_linux_gnu: ${{ matrix.ar }}

      - run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/mongreldb-server dist/${{ matrix.asset }}
          chmod +x dist/${{ matrix.asset }}

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/${{ matrix.asset }}

  release-darwin-binaries:
    needs: publish-crate
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref || inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-server

      - run: brew install protobuf

      - run: cargo build --release --bin mongreldb-server --target x86_64-apple-darwin
        working-directory: crates/mongreldb-server

      - run: cargo build --release --bin mongreldb-server --target aarch64-apple-darwin
        working-directory: crates/mongreldb-server

      - run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/mongreldb-server dist/mongreldb-server-darwin-arm64
          lipo -create \
            target/x86_64-apple-darwin/release/mongreldb-server \
            target/aarch64-apple-darwin/release/mongreldb-server \
            -output dist/mongreldb-server-darwin-universal
          chmod +x dist/mongreldb-server-darwin-arm64 dist/mongreldb-server-darwin-universal

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/mongreldb-server-darwin-arm64
            dist/mongreldb-server-darwin-universal
