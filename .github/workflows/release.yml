# Builds the native addon and publishes @visorcraft/mongreldb to npm, and
# publishes the mongreldb-core and mongreldb-query Rust crates to crates.io,
# on a tag.
#
# Bundles linux-x64-gnu and linux-arm64-gnu .node files so low-power ARM64
# Linux hosts can install from npm without compiling the addon locally.
#
# Publish this BEFORE @visorcraft/mongreldb-kit — the kit's release installs
# this package from npm to satisfy its peer dependency.
#
# Release flow: bump "version" in crates/mongreldb-node/package.json and
# workspace.package.version in Cargo.toml, commit, then tag and push the
# matching version, for example:
#   git tag v0.18.2 && git push origin master v0.18.2
# npm/crates.io both refuse to republish an existing version, so the tag must
# be a new version.
#
# mongreldb-query is published alongside mongreldb-core (MongrelDB Kit's Rust
# crate depends on it for its SQL surface — Database::sql()/sql_arrow() and
# view/analyze/vacuum migration ops). mongreldb-core publishes first, since
# mongreldb-query depends on it and crates.io strips path deps at publish time.
#
# Requires repo secrets:
#   NPM_TOKEN            — granular npm token, read+write on @visorcraft
#   CARGO_REGISTRY_TOKEN — crates.io API token, publish scope
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write # npm provenance
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-node
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/mongreldb-node

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: '@visorcraft'

      - run: npm ci

      - run: npm run build

      - run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - run: npx napi build --release --platform --strip --target aarch64-unknown-linux-gnu --js false
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar

      - run: test -f mongreldb.linux-arm64-gnu.node

      # Sanity gate: the freshly built addon must load before we publish.
      - run: node -e "require('./index.js'); console.log('addon loads OK')"

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo publish -p mongreldb-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # mongreldb-query depends on mongreldb-core (published above) and is in
      # turn a dependency of mongreldb-kit's SQL surface. Must follow core.
      - run: cargo publish -p mongreldb-query
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # mongreldb-server (the HTTP daemon) publishes last — it depends on
      # mongreldb-core, mongreldb-query, and mongreldb-client. All are
      # standalone crates (own [workspace]), so we cd into each.
      - run: cd crates/mongreldb-client && cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - run: cd crates/mongreldb-server && cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-linux-binaries:
    runs-on: ubuntu-latest
    needs: [publish, publish-crate]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset: mongreldb-server-linux-x64
            apt: ''
            linker: ''
            ar: ''
          - target: x86_64-unknown-linux-musl
            asset: mongreldb-server-linux-x64-musl
            apt: musl-tools
            linker: ''
            ar: ''
          - target: aarch64-unknown-linux-gnu
            asset: mongreldb-server-linux-arm64
            apt: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
            ar: aarch64-linux-gnu-ar
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/mongreldb-server

      - if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - run: cargo build --release --bin mongreldb-server --target ${{ matrix.target }}
        working-directory: crates/mongreldb-server
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.linker }}
          AR_aarch64_unknown_linux_gnu: ${{ matrix.ar }}

      - run: |
          mkdir -p dist
          cp crates/mongreldb-server/target/${{ matrix.target }}/release/mongreldb-server dist/${{ matrix.asset }}
          chmod +x dist/${{ matrix.asset }}

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}

  release-darwin-binaries:
    runs-on: macos-14
    needs: [publish, publish-crate]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/mongreldb-server

      - run: cargo build --release --bin mongreldb-server --target x86_64-apple-darwin
        working-directory: crates/mongreldb-server

      - run: cargo build --release --bin mongreldb-server --target aarch64-apple-darwin
        working-directory: crates/mongreldb-server

      - run: |
          mkdir -p dist
          cp crates/mongreldb-server/target/aarch64-apple-darwin/release/mongreldb-server dist/mongreldb-server-darwin-arm64
          lipo -create \
            crates/mongreldb-server/target/x86_64-apple-darwin/release/mongreldb-server \
            crates/mongreldb-server/target/aarch64-apple-darwin/release/mongreldb-server \
            -output dist/mongreldb-server-darwin-universal
          chmod +x dist/mongreldb-server-darwin-arm64 dist/mongreldb-server-darwin-universal

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mongreldb-server-darwin-arm64
            dist/mongreldb-server-darwin-universal

  release-server-image:
    runs-on: ubuntu-latest
    needs: [publish, publish-crate]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/visorcraft/mongreldb-server
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
