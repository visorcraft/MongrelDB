# Builds the native addon and publishes @visorcraft/mongreldb to npm, and
# publishes the mongreldb-core and mongreldb-query Rust crates to crates.io,
# on a tag.
#
# Bundles linux-x64-gnu and linux-arm64-gnu .node files so low-power ARM64
# Linux hosts can install from npm without compiling the addon locally.
#
# Publish this BEFORE @visorcraft/mongreldb-kit — the kit's release installs
# this package from npm to satisfy its peer dependency.
#
# Release flow: bump "version" in crates/mongreldb-node/package.json and
# workspace.package.version in Cargo.toml, commit, then tag and push the
# matching version, for example:
#   git tag v0.18.2 && git push origin master v0.18.2
# npm/crates.io both refuse to republish an existing version, so the tag must
# be a new version.
#
# mongreldb-query is published alongside mongreldb-core (MongrelDB Kit's Rust
# crate depends on it for its SQL surface — Database::sql()/sql_arrow() and
# view/analyze/vacuum migration ops). mongreldb-core publishes first, since
# mongreldb-query depends on it and crates.io strips path deps at publish time.
#
# Job graph (max parallelism, native arch runners — no QEMU):
#   wave 1 (parallel): publish-crate · build-addon[x64|arm64] · image-amd64 · image-arm64
#   wave 2 (parallel): publish-npm (needs build-addon) · image-manifest (needs image-amd64+arm64)
#   wave 3:            release-linux/darwin-binaries (needs publish-npm + publish-crate)
# The arm64 addon .node and arm64 server image build on ubuntu-24.04-arm
# (native, free for public repos), avoiding hours of QEMU emulation.
#
# Requires repo secrets:
#   NPM_TOKEN            — granular npm token, read+write on @visorcraft
#   CARGO_REGISTRY_TOKEN — crates.io API token, publish scope
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # npm provenance
  packages: write

jobs:
  publish-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2.9.1

      # Local release preparation may publish these first to unblock Kit.
      # Treat an existing immutable crate version as success.
      - name: Publish Rust crates
        run: |
          publish_crate() {
            local output
            output="$(cargo publish "$@" 2>&1)" && { echo "$output"; return 0; }
            echo "$output"
            echo "$output" | grep -qE 'already exists|already published'
          }
          publish_crate -p mongreldb-core
          publish_crate -p mongreldb-query
          publish_crate --manifest-path crates/mongreldb-client/Cargo.toml
          publish_crate --manifest-path crates/mongreldb-server/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Build each platform's .node on its native arch runner (x64 on ubuntu-latest,
  # arm64 on ubuntu-24.04-arm), in parallel. The x64 job also emits the shared
  # native.js/native.d.ts wrappers. Artifacts are reassembled by publish-npm.
  build-addon:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node-file: mongreldb.linux-x64-gnu.node
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            node-file: mongreldb.linux-arm64-gnu.node
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: crates/mongreldb-node
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-node

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm ci

      # x64 build also generates the JS/DTS wrappers consumed by every arch.
      - run: npx napi build --release --platform --strip --target ${{ matrix.target }} --js native.js --dts native.d.ts
        if: matrix.target == 'x86_64-unknown-linux-gnu'
      - run: npx napi build --release --platform --strip --target ${{ matrix.target }} --js false
        if: matrix.target != 'x86_64-unknown-linux-gnu'

      - run: test -f ${{ matrix.node-file }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.node-file }}
          path: crates/mongreldb-node/${{ matrix.node-file }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        with:
          name: mongreldb.addon-js
          path: |
            crates/mongreldb-node/native.js
            crates/mongreldb-node/native.d.ts
          if-no-files-found: error

  publish-npm:
    needs: [build-addon]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-node
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: '@visorcraft'

      - uses: actions/download-artifact@v8
        with:
          pattern: 'mongreldb.*'
          path: crates/mongreldb-node
          merge-multiple: true

      - run: |
          test -f mongreldb.linux-x64-gnu.node
          test -f mongreldb.linux-arm64-gnu.node
          test -f native.js
          test -f native.d.ts

      # Sanity gate: the freshly built addon must load before we publish.
      - run: node -e "require('./index.js'); console.log('addon loads OK')"

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Each arch's server image builds natively (no QEMU), pushed under an
  # arch-suffixed tag; image-manifest merges them into the version + latest tags.
  image-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ghcr.io/visorcraft/mongreldb-server:${{ github.ref_name }}-amd64

  image-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ghcr.io/visorcraft/mongreldb-server:${{ github.ref_name }}-arm64

  image-manifest:
    needs: [image-amd64, image-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          docker buildx imagetools create \
            -t ghcr.io/visorcraft/mongreldb-server:${{ github.ref_name }} \
            -t ghcr.io/visorcraft/mongreldb-server:latest \
            ghcr.io/visorcraft/mongreldb-server:${{ github.ref_name }}-amd64 \
            ghcr.io/visorcraft/mongreldb-server:${{ github.ref_name }}-arm64

  release-linux-binaries:
    needs: [publish-npm, publish-crate]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset: mongreldb-server-linux-x64
            apt: ''
            linker: ''
            ar: ''
          - target: x86_64-unknown-linux-musl
            asset: mongreldb-server-linux-x64-musl
            apt: musl-tools
            linker: ''
            ar: ''
          - target: aarch64-unknown-linux-gnu
            asset: mongreldb-server-linux-arm64
            apt: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
            ar: aarch64-linux-gnu-ar
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-server

      - if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - run: cargo build --release --bin mongreldb-server --target ${{ matrix.target }}
        working-directory: crates/mongreldb-server
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.linker }}
          AR_aarch64_unknown_linux_gnu: ${{ matrix.ar }}

      - run: |
          mkdir -p dist
          cp crates/mongreldb-server/target/${{ matrix.target }}/release/mongreldb-server dist/${{ matrix.asset }}
          chmod +x dist/${{ matrix.asset }}

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ matrix.asset }}

  release-darwin-binaries:
    needs: [publish-npm, publish-crate]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-server

      - run: cargo build --release --bin mongreldb-server --target x86_64-apple-darwin
        working-directory: crates/mongreldb-server

      - run: cargo build --release --bin mongreldb-server --target aarch64-apple-darwin
        working-directory: crates/mongreldb-server

      - run: |
          mkdir -p dist
          cp crates/mongreldb-server/target/aarch64-apple-darwin/release/mongreldb-server dist/mongreldb-server-darwin-arm64
          lipo -create \
            crates/mongreldb-server/target/x86_64-apple-darwin/release/mongreldb-server \
            crates/mongreldb-server/target/aarch64-apple-darwin/release/mongreldb-server \
            -output dist/mongreldb-server-darwin-universal
          chmod +x dist/mongreldb-server-darwin-arm64 dist/mongreldb-server-darwin-universal

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/mongreldb-server-darwin-arm64
            dist/mongreldb-server-darwin-universal
