# Builds prebuilt native libraries (libmongreldb) for the C ABI and attaches
# them to the GitHub release. These archives are the foundation for all
# Tier-1 native language bindings: each language client fetches the archive
# for its platform, links libmongreldb, and includes mongreldb.h.
#
# The mongreldb-ffi crate is `publish = false` (it is a cdylib/staticlib
# artifact, not a consumable Rust crate), so it is never sent to crates.io.
# Instead, each release produces per-platform archives containing:
#   lib/   - shared + static libraries (musl targets are static-only because
#            Rust drops the unsupported `cdylib` crate type for that target)
#   include/mongreldb.h
#
# Triggered on the same `v*` tag push as release.yml. Runs in parallel with
# the other release jobs (it does not depend on crates.io or npm publishing).
#
# Platform matrix (6 targets, all built natively - no QEMU):
#   linux-x64-gnu      ubuntu-latest     x86_64-unknown-linux-gnu
#   linux-x64-musl     ubuntu-latest     x86_64-unknown-linux-musl
#   linux-arm64-gnu    ubuntu-24.04-arm  aarch64-unknown-linux-gnu
#   darwin-arm64       macos-14          aarch64-apple-darwin
#   darwin-x64         macos-15          x86_64-apple-darwin
#   windows-x64        windows-latest    x86_64-pc-windows-msvc
name: FFI Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload artifacts to (e.g. v0.49.0)'
        required: true
        default: 'v0.49.0'
      checkout_ref:
        description: 'Git ref of MongrelDB to build from (defaults to tag; use master when tag lags pin fixes)'
        required: false
        default: ''
      kit_tag:
        description: 'MongrelDB-Kit tag to build from (defaults to the engine release tag)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  verify-components:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.event.inputs.tag || github.ref_name }}
      - uses: actions/checkout@v7
        with:
          repository: visorcraft/MongrelDB-Kit
          ref: ${{ github.event.inputs.kit_tag || github.event.inputs.tag || github.ref_name }}
          path: .release-kit
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Verify aggregate dependency train
        shell: bash
        run: |
          version="${{ github.event.inputs.tag || github.ref_name }}"
          version="${version#v}"
          mkdir -p target
          cargo metadata --manifest-path crates/mongreldb-jni/Cargo.toml --locked --format-version 1 > target/jni-metadata.json
          cargo metadata --manifest-path crates/mongreldb-kit-ffi/Cargo.toml --locked --format-version 1 > target/kit-ffi-metadata.json
          scripts/verify-release-component-versions.py --expected "$version" target/jni-metadata.json target/kit-ffi-metadata.json
          test "$(git -C .release-kit describe --tags --exact-match)" = "${{ github.event.inputs.kit_tag || github.event.inputs.tag || github.ref_name }}"

  build-native:
    needs: verify-components
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: mongreldb-native-linux-x64-gnu.tar.gz
            apt: ''
            linker: ''
            ar: ''
            zip: false
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: mongreldb-native-linux-x64-musl.tar.gz
            apt: musl-tools
            linker: ''
            ar: ''
            zip: false
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: mongreldb-native-linux-arm64-gnu.tar.gz
            apt: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
            ar: aarch64-linux-gnu-ar
            zip: false
          - runner: macos-14
            target: aarch64-apple-darwin
            archive: mongreldb-native-darwin-arm64.tar.gz
            apt: ''
            linker: ''
            ar: ''
            zip: false
          - runner: macos-15
            target: x86_64-apple-darwin
            archive: mongreldb-native-darwin-x64.tar.gz
            apt: ''
            linker: ''
            ar: ''
            zip: false
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: mongreldb-native-windows-x64.zip
            apt: ''
            linker: ''
            ar: ''
            zip: true
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: crates/mongreldb-ffi
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.event.inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-ffi

      - if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      # Build the cdylib + staticlib. The crate has crate-type =
      # ["cdylib", "staticlib", "rlib"], so this produces all three. We build
      # for the matrix target; cross-compilation uses the apt-installed
      # toolchains (musl-gcc for musl, aarch64-linux-gnu-gcc for arm64).
      - run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.linker }}
          AR_aarch64_unknown_linux_gnu: ${{ matrix.ar }}

      - name: Package (Linux/macOS)
        if: matrix.zip == false
        working-directory: .
        run: |
          mkdir -p dist/mongreldb-native/lib dist/mongreldb-native/include
          cp target/${{ matrix.target }}/release/libmongreldb.a dist/mongreldb-native/lib/
          if [ "${{ matrix.target }}" = x86_64-unknown-linux-musl ]; then
            : # Rust emits the staticlib and drops cdylib for musl.
          elif [ -f target/${{ matrix.target }}/release/libmongreldb.so ]; then
            cp target/${{ matrix.target }}/release/libmongreldb.so dist/mongreldb-native/lib/
          else
            cp target/${{ matrix.target }}/release/libmongreldb.dylib dist/mongreldb-native/lib/
          fi
          cp crates/mongreldb-ffi/include/mongreldb.h dist/mongreldb-native/include/
          tar -czf dist/${{ matrix.archive }} -C dist mongreldb-native

      - name: Package (Windows)
        if: matrix.zip == true
        working-directory: .
        shell: bash
        run: |
          mkdir -p dist/mongreldb-native/lib dist/mongreldb-native/include
          cp target/${{ matrix.target }}/release/mongreldb.dll \
             target/${{ matrix.target }}/release/mongreldb.dll.lib \
             dist/mongreldb-native/lib/
          cp target/${{ matrix.target }}/release/mongreldb.dll.lib \
             dist/mongreldb-native/lib/mongreldb.lib
          cp crates/mongreldb-ffi/include/mongreldb.h dist/mongreldb-native/include/
          (cd dist && 7z a ${{ matrix.archive }} mongreldb-native)

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/${{ matrix.archive }}

  # Build the Kit FFI (libmongreldb_kit) for the same 6 platform targets.
  # This is the Kit layer (schema model, migrations, query builder, validation).
  build-kit-native:
    needs: verify-components
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: mongreldb-kit-native-linux-x64-gnu.tar.gz
            apt: ''
            zip: false
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: mongreldb-kit-native-linux-x64-musl.tar.gz
            apt: musl-tools
            zip: false
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: mongreldb-kit-native-linux-arm64-gnu.tar.gz
            apt: gcc-aarch64-linux-gnu
            zip: false
          - runner: macos-14
            target: aarch64-apple-darwin
            archive: mongreldb-kit-native-darwin-arm64.tar.gz
            apt: ''
            zip: false
          - runner: macos-15
            target: x86_64-apple-darwin
            archive: mongreldb-kit-native-darwin-x64.tar.gz
            apt: ''
            zip: false
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: mongreldb-kit-native-windows-x64.zip
            apt: ''
            zip: true
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: crates/mongreldb-kit-ffi
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.event.inputs.tag || github.ref_name }}

      - uses: actions/checkout@v7
        with:
          repository: visorcraft/MongrelDB-Kit
          ref: ${{ github.event.inputs.kit_tag || github.event.inputs.tag || github.ref_name }}
          path: .release-kit

      - name: Record exact build identities
        shell: bash
        run: |
          echo "MONGRELDB_GIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "MONGRELDB_KIT_GIT_SHA=$(git -C .release-kit rev-parse HEAD)" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-kit-ffi

      - if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CC_x86_64_unknown_linux_musl: musl-gcc

      - name: Package (Linux/macOS)
        if: matrix.zip == false
        working-directory: .
        run: |
          mkdir -p dist/mongreldb-kit-native/lib dist/mongreldb-kit-native/include
          cp crates/mongreldb-kit-ffi/target/${{ matrix.target }}/release/libmongreldb_kit.a \
             dist/mongreldb-kit-native/lib/
          if [ "${{ matrix.target }}" = x86_64-unknown-linux-musl ]; then
            : # Rust emits the staticlib and drops cdylib for musl.
          elif [ -f crates/mongreldb-kit-ffi/target/${{ matrix.target }}/release/libmongreldb_kit.so ]; then
            cp crates/mongreldb-kit-ffi/target/${{ matrix.target }}/release/libmongreldb_kit.so \
               dist/mongreldb-kit-native/lib/
          else
            cp crates/mongreldb-kit-ffi/target/${{ matrix.target }}/release/libmongreldb_kit.dylib \
               dist/mongreldb-kit-native/lib/
          fi
          cp crates/mongreldb-kit-ffi/include/mongreldb_kit.h dist/mongreldb-kit-native/include/
          tar -czf dist/${{ matrix.archive }} -C dist mongreldb-kit-native

      - name: Package (Windows)
        if: matrix.zip == true
        working-directory: .
        shell: bash
        run: |
          mkdir -p dist/mongreldb-kit-native/lib dist/mongreldb-kit-native/include
          cp crates/mongreldb-kit-ffi/target/${{ matrix.target }}/release/mongreldb_kit.dll \
             crates/mongreldb-kit-ffi/target/${{ matrix.target }}/release/mongreldb_kit.dll.lib \
             dist/mongreldb-kit-native/lib/
          cp crates/mongreldb-kit-ffi/target/${{ matrix.target }}/release/mongreldb_kit.dll.lib \
             dist/mongreldb-kit-native/lib/mongreldb_kit.lib
          cp crates/mongreldb-kit-ffi/include/mongreldb_kit.h dist/mongreldb-kit-native/include/
          (cd dist && 7z a ${{ matrix.archive }} mongreldb-kit-native)

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/${{ matrix.archive }}

  # Also publish a standalone headers archive (both mongreldb.h and
  # mongreldb_kit.h) so downstream build systems can fetch just headers.
  release-headers:
    needs: verify-components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.event.inputs.tag || github.ref_name }}

      - run: |
          mkdir -p dist/mongreldb-headers/include
          cp crates/mongreldb-ffi/include/mongreldb.h dist/mongreldb-headers/include/
          cp crates/mongreldb-kit-ffi/include/mongreldb_kit.h dist/mongreldb-headers/include/
          tar -czf dist/mongreldb-headers.tar.gz -C dist mongreldb-headers

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/mongreldb-headers.tar.gz

  # Build the JNI shim (libmongreldb_jni) for the JVM clients (Java, Kotlin,
  # Scala). Produces a fat JAR with all platform natives bundled, plus
  # per-platform JARs.
  build-jni:
    needs: verify-components
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os: linux
            arch: x64
            apt: ''
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os: linux
            arch: arm64
            apt: gcc-aarch64-linux-gnu
          - runner: macos-14
            target: aarch64-apple-darwin
            os: darwin
            arch: arm64
            apt: ''
          - runner: macos-15
            target: x86_64-apple-darwin
            os: darwin
            arch: x64
            apt: ''
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            os: windows
            arch: x64
            apt: ''
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.event.inputs.tag || github.ref_name }}

      - uses: actions/checkout@v7
        with:
          repository: visorcraft/MongrelDB-Kit
          ref: ${{ github.event.inputs.kit_tag || github.event.inputs.tag || github.ref_name }}
          path: .release-kit

      - name: Record exact build identities
        shell: bash
        run: |
          echo "MONGRELDB_GIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "MONGRELDB_KIT_GIT_SHA=$(git -C .release-kit rev-parse HEAD)" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-jni

      - if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Build JNI library
        working-directory: crates/mongreldb-jni
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CC_x86_64_unknown_linux_musl: musl-gcc

      - name: Stage native library (Unix)
        if: matrix.os != 'windows'
        run: |
          mkdir -p staging/native/${{ matrix.os }}/${{ matrix.arch }}
          ext="so"
          if [ "${{ matrix.os }}" = "darwin" ]; then ext="dylib"; fi
          cp crates/mongreldb-jni/target/${{ matrix.target }}/release/libmongreldb_jni.$ext \
             staging/native/${{ matrix.os }}/${{ matrix.arch }}/

      - name: Stage native library (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          mkdir -p staging/native/windows/${{ matrix.arch }}
          cp crates/mongreldb-jni/target/${{ matrix.target }}/release/mongreldb_jni.dll \
             staging/native/windows/${{ matrix.arch }}/

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - name: Build per-platform JAR
        working-directory: crates/mongreldb-jni/java
        shell: bash
        run: |
          # Copy staged native lib into the JAR resources path.
          mkdir -p src/main/resources/native/${{ matrix.os }}/${{ matrix.arch }}
          if [ "${{ matrix.os }}" = "windows" ]; then
            cp ../../../staging/native/windows/${{ matrix.arch }}/* src/main/resources/native/windows/${{ matrix.arch }}/
          else
            cp ../../../staging/native/${{ matrix.os }}/${{ matrix.arch }}/* src/main/resources/native/${{ matrix.os }}/${{ matrix.arch }}/
          fi
          mvn -B -ntp package
          # Rename to include platform in the filename.
          mkdir -p ../../../dist
          cp target/mongreldb-jni-0.63.1.jar ../../../dist/mongreldb-jni-0.63.1-${{ matrix.os }}-${{ matrix.arch }}.jar

      - uses: actions/upload-artifact@v7
        with:
          name: jni-${{ matrix.os }}-${{ matrix.arch }}
          path: staging/native/**
          if-no-files-found: error

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/mongreldb-jni-*.jar

  # Assemble the fat JAR (all platforms) from the per-platform artifacts.
  build-jni-fat:
    needs: [build-jni]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.event.inputs.tag || github.ref_name }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - uses: actions/download-artifact@v8
        with:
          pattern: jni-*
          path: staging/native
          merge-multiple: true

      - name: Build fat JAR
        working-directory: crates/mongreldb-jni/java
        run: |
          mkdir -p src/main/resources/native
          cp -r ../../../staging/native/* src/main/resources/native/
          mvn -B -ntp package
          mkdir -p ../../../dist
          cp target/mongreldb-jni-0.63.1.jar ../../../dist/mongreldb-jni-0.63.1.jar

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/mongreldb-jni-0.63.1.jar

  # Publish the fat JAR (with all bundled native libraries) to Maven Central.
  # Runs after build-jni-fat assembles the fat JAR; re-uses its checkout and
  # resources. The release profile attaches sources + javadoc, GPG-signs, and
  # uploads via the central-publishing-maven-plugin.
  deploy-jni:
    needs: [build-jni-fat]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.event.inputs.tag || github.ref_name }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - name: Import GPG signing key
        run: |
          # Import the ASCII-armored key into the default keyring so the
          # maven-gpg-plugin finds it via gpg's normal homedir resolution.
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --dearmor --output /tmp/signing.gpg
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          gpg --batch --import /tmp/signing.gpg
          # Trust the key ultimately so gpg doesn't prompt during signing.
          echo -e "5\ny\n" | gpg --batch --command-fd 0 --expert --edit-key ${{ secrets.GPG_KEY_ID }} trust

      - name: Configure Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'XML'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.CENTRAL_USERNAME}</username>
                <password>${env.CENTRAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Stage all native libs into JAR resources
        uses: actions/download-artifact@v8
        with:
          pattern: jni-*
          path: staging/native
          merge-multiple: true

      - name: Deploy fat JAR to Maven Central
        working-directory: crates/mongreldb-jni/java
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          mkdir -p src/main/resources/native
          cp -r ../../../staging/native/* src/main/resources/native/
          mvn -B -ntp -Prelease deploy \
            -Dgpg.keyname=${{ secrets.GPG_KEY_ID }} \
            -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}
