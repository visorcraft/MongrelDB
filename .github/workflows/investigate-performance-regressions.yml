name: Investigate performance regressions

on:
  push:
    branches:
      - agent/investigate-performance-regressions-bb59
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: investigate-performance-regressions-bb59
  cancel-in-progress: true

env:
  HEAD_SHA: bb59eb8d7071a2c08e2d0084b11c1c82cb12a521
  QUAL_BASE: edb690b115846681f5149b2bd56fc92b05ff6166
  RUST_OLD: "1.96.1"
  RUST_NEW: "1.97.1"

jobs:
  p0-ablation:
    name: P0 hardening-cost ablation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_OLD }}
      - uses: Swatinem/rust-cache@v2.9.1
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler jq
      - run: bash .github/perf-investigation/p0-ablation.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: p0-put-ablation
          path: /tmp/p0-ablation
          if-no-files-found: error

  p1-ablation:
    name: P1 validation-cost ablation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_OLD }}
      - uses: Swatinem/rust-cache@v2.9.1
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler jq
      - run: bash .github/perf-investigation/p1-ablation.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: p1-bulk-ablation
          path: /tmp/p1-ablation
          if-no-files-found: error

  p2-exact:
    name: Exact P2 HTTP comparison
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_NEW }}
      - uses: Swatinem/rust-cache@v2.9.1
      - run: rustup toolchain install "$RUST_OLD" --profile minimal
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: bash .github/perf-investigation/p2-exact.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: p2-exact-comparison
          path: /tmp/p2-exact
          if-no-files-found: error
