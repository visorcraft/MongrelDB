name: Investigate performance regressions

on:
  push:
    branches:
      - agent/investigate-performance-regressions-bb59
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: investigate-performance-regressions-bb59
  cancel-in-progress: true

env:
  HEAD_SHA: bb59eb8d7071a2c08e2d0084b11c1c82cb12a521
  RUST_NEW: "1.97.1"
  RUST_OLD: "1.96.1"

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      core_base: ${{ steps.refs.outputs.core_base }}
      qual_base: ${{ steps.refs.outputs.qual_base }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: refs
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*'
          core_base=$(git rev-list -1 --first-parent --before='2026-07-16T00:00:00-05:00' origin/master)
          qual_base=$(git rev-list -1 --before='2026-07-18T00:00:00-05:00' origin/architecture_expansion 2>/dev/null || true)
          if [[ -z "$qual_base" ]]; then
            qual_base=$(git rev-list -1 --first-parent --before='2026-07-18T00:00:00-05:00' origin/master)
          fi
          printf 'core_base=%s\nqual_base=%s\n' "$core_base" "$qual_base" | tee /tmp/refs.txt
          echo "core_base=$core_base" >> "$GITHUB_OUTPUT"
          echo "qual_base=$qual_base" >> "$GITHUB_OUTPUT"
          {
            echo
            echo '=== commits around measurement window ==='
            git log --all --since='2026-07-13T00:00:00-05:00' --until='2026-07-19T23:59:59-05:00' \
              --date=iso-strict --pretty='%H %ad %D%n    %s'
            echo
            echo '=== BENCHMARKS.md history ==='
            git log --all --follow --date=iso-strict --pretty='%H %ad %D%n    %s' -- BENCHMARKS.md
            echo
            echo '=== selected base summaries ==='
            git show -s --date=iso-strict --format='%H%n%ad%n%s%n' "$core_base"
            git show -s --date=iso-strict --format='%H%n%ad%n%s%n' "$qual_base"
          } | tee -a /tmp/refs.txt
      - uses: actions/upload-artifact@v4
        with:
          name: perf-investigation-metadata
          path: /tmp/refs.txt

  p0-put:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_NEW }}
      - uses: Swatinem/rust-cache@v2.9.1
      - run: rustup toolchain install "${RUST_OLD}" --profile minimal
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler jq
      - name: Compare put_no_fsync across code and toolchain
        shell: bash
        env:
          CORE_BASE: ${{ needs.metadata.outputs.core_base }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/perf-results
          git worktree add --detach /tmp/core-base "$CORE_BASE"
          git worktree add --detach /tmp/core-head "$HEAD_SHA"

          run_one() {
            local dir=$1 label=$2 toolchain=$3
            local target="/tmp/target-p0-${label}-${toolchain//./_}"
            local log="/tmp/perf-results/p0-${label}-${toolchain}.log"
            echo "=== $label $toolchain $(git -C "$dir" rev-parse HEAD) ===" | tee "$log"
            (
              cd "$dir"
              CARGO_TARGET_DIR="$target" cargo "+$toolchain" bench -p mongreldb-core \
                --bench write_path -- write_path/put_no_fsync \
                --noplot --sample-size 80 --measurement-time 5 --warm-up-time 2
            ) 2>&1 | tee -a "$log"
            estimate=$(find "$target/criterion" -path '*/write_path/put_no_fsync/new/estimates.json' -print -quit)
            jq -c --arg label "$label" --arg toolchain "$toolchain" \
              '{label:$label,toolchain:$toolchain,mean_ns:.mean.point_estimate,median_ns:.median.point_estimate,slope_ns:(.slope.point_estimate // null)}' \
              "$estimate" | tee -a /tmp/perf-results/p0-summary.jsonl
          }

          run_one /tmp/core-base base "$RUST_OLD"
          run_one /tmp/core-head head "$RUST_OLD"
          run_one /tmp/core-base base "$RUST_NEW"
          run_one /tmp/core-head head "$RUST_NEW"
          cat /tmp/perf-results/p0-summary.jsonl
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-investigation-p0
          path: /tmp/perf-results

  p1-bulk:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_NEW }}
      - uses: Swatinem/rust-cache@v2.9.1
      - run: rustup toolchain install "${RUST_OLD}" --profile minimal
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler jq
      - name: Compare 1M bulk-load family
        shell: bash
        env:
          CORE_BASE: ${{ needs.metadata.outputs.core_base }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/perf-results
          git worktree add --detach /tmp/core-base "$CORE_BASE"
          git worktree add --detach /tmp/core-head "$HEAD_SHA"

          run_one() {
            local dir=$1 label=$2 toolchain=$3
            local target="/tmp/target-p1-${label}-${toolchain//./_}"
            local log="/tmp/perf-results/p1-${label}-${toolchain}.log"
            echo "=== $label $toolchain $(git -C "$dir" rev-parse HEAD) ===" | tee "$log"
            (
              cd "$dir"
              CARGO_TARGET_DIR="$target" cargo "+$toolchain" bench -p mongreldb-core \
                --bench scale -- 'scale/(bulk_load|bulk_load_columns|bulk_load_fast)/1000000' \
                --noplot --sample-size 10 --measurement-time 4 --warm-up-time 1
            ) 2>&1 | tee -a "$log"
            while IFS= read -r estimate; do
              bench=$(python3 - "$estimate" <<'PY'
          import pathlib, sys
          p = pathlib.Path(sys.argv[1])
          parts = p.parts
          i = parts.index('criterion')
          print('/'.join(parts[i+1:-2]))
          PY
              )
              jq -c --arg label "$label" --arg toolchain "$toolchain" --arg bench "$bench" \
                '{label:$label,toolchain:$toolchain,bench:$bench,mean_ns:.mean.point_estimate,median_ns:.median.point_estimate,slope_ns:(.slope.point_estimate // null)}' \
                "$estimate" >> /tmp/perf-results/p1-summary.jsonl
            done < <(find "$target/criterion/scale" -path '*/1000000/new/estimates.json' | sort)
          }

          run_one /tmp/core-base base "$RUST_OLD"
          run_one /tmp/core-head head "$RUST_OLD"
          run_one /tmp/core-head head "$RUST_NEW"
          cat /tmp/perf-results/p1-summary.jsonl
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-investigation-p1
          path: /tmp/perf-results

  p2-http:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_NEW }}
      - uses: Swatinem/rust-cache@v2.9.1
      - run: rustup toolchain install "${RUST_OLD}" --profile minimal
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Compare loopback HTTP point query
        shell: bash
        env:
          QUAL_BASE: ${{ needs.metadata.outputs.qual_base }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/perf-results
          git worktree add --detach /tmp/qual-base "$QUAL_BASE"
          git worktree add --detach /tmp/qual-head "$HEAD_SHA"

          run_one() {
            local dir=$1 label=$2 toolchain=$3
            local target="/tmp/target-p2-${label}-${toolchain//./_}"
            local log="/tmp/perf-results/p2-${label}-${toolchain}.log"
            echo "=== $label $toolchain $(git -C "$dir" rev-parse HEAD) ===" | tee "$log"
            for repetition in 1 2 3; do
              echo "--- repetition $repetition ---" | tee -a "$log"
              (
                cd "$dir/crates/mongreldb-server"
                CARGO_TARGET_DIR="$target" cargo "+$toolchain" test --release \
                  --test scale_test loopback_point_query_p95_baseline -- --nocapture
              ) 2>&1 | tee -a "$log"
            done
            grep '"test":"loopback_point_query"' "$log" | sed \
              "s/^/{\"label\":\"$label\",\"toolchain\":\"$toolchain\",\"result\":/; s/$/}/" \
              >> /tmp/perf-results/p2-summary.jsonl || true
          }

          run_one /tmp/qual-base base "$RUST_OLD"
          run_one /tmp/qual-head head "$RUST_OLD"
          run_one /tmp/qual-head head "$RUST_NEW"
          cat /tmp/perf-results/p2-summary.jsonl
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-investigation-p2
          path: /tmp/perf-results
