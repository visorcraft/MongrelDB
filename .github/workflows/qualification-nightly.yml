name: Qualification nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: qualification-nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_VERSION: "1.97.1"
  RUST_NIGHTLY: "nightly-2026-07-16"

jobs:
  # Stage 1 gate (spec §10): one-million-row overlapping read/write with
  # bounded RSS and commit p99, plus the warm embedded point-query baseline.
  core-qualification-1m:
    name: Core qualification, one million rows
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Stage 1 gate qualification (1M rows)
        env:
          MONGRELDB_QUAL_ROWS: "1000000"
        run: cargo test -p mongreldb-core --test qualification --release -- --nocapture

  # Stage 1 gate (spec §10): 1,000 concurrent client sessions remain stable,
  # no crash/OOM under load, loopback point-query p95 baseline.
  server-scale:
    name: Server scale test (1,000 sessions, loopback p95)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: crates/mongreldb-server
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-server
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Server scale test
        run: cargo test --release --test scale_test -- --nocapture

  # FND-005 (spec §9.5): every scenario must be seed-deterministic; failed
  # seeds persist as CI artifacts for exact repro.
  sim-determinism:
    name: Sim determinism suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MONGRELDB_SIM_FAILURES: ${{ github.workspace }}/target/sim-failures
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Sim determinism suite
        run: cargo test -p mongreldb-sim
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sim-failed-seeds-${{ github.run_id }}
          path: target/sim-failures/
          if-no-files-found: ignore

  fuzz:
    name: Extended parser fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_NIGHTLY }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: fuzz
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo install cargo-fuzz --locked
      - name: Extended fuzz
        working-directory: fuzz
        run: |
          for target in protocol_envelope wal consensus_snapshot cursor_token sql_adapter_packet; do
            cargo fuzz run "$target" -- -max_total_time=600
          done

  cross-platform:
    name: Full tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2.9.1
      - if: runner.os == 'macOS'
        run: brew install protobuf
      - if: runner.os == 'Windows'
        run: choco install protoc --yes --no-progress
      - run: cargo test --workspace --all-features

  mysql-migration:
    name: Real MySQL migration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-migrate-mysql
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-migrate-mysql
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Start TLS MySQL 8.4 source
        working-directory: .
        run: bash scripts/start-test-mysql.sh
      - run: cargo clippy --all-targets -- -D warnings
      - name: Run real source integration
        env:
          MONGRELDB_TEST_MYSQL_HOST: localhost
          MONGRELDB_TEST_MYSQL_PORT: "33060"
          MONGRELDB_TEST_MYSQL_PASSWORD: mongreldb-test
          MONGRELDB_TEST_MYSQL_CA: ${{ github.workspace }}/target/mysql-tls/ca.pem
        run: cargo test --test mysql_container -- --nocapture

  ffi-sanitizer:
    name: C FFI sanitizer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-ffi
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-ffi
      - run: cargo build --release
      - run: MONGRELDB_C_SANITIZE=1 cargo test --release --test c_smoke_test
