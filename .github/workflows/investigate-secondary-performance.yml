name: Investigate secondary performance regressions

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  CORE_BASE: eecb39fcbe9d8da7c0921db871f032a3e59e0762
  QUAL_BASE: edb690b115846681f5149b2bd56fc92b05ff6166
  HEAD_SHA: bb59eb8d7071a2c08e2d0084b11c1c82cb12a521
  RUST_OLD: "1.96.1"
  RUST_NEW: "1.97.1"

jobs:
  s1-sql-control:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_NEW }}
      - uses: Swatinem/rust-cache@v2.9.1
      - run: rustup toolchain install "$RUST_OLD" --profile minimal
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler jq
      - shell: bash
        run: |
          set -euo pipefail
          out=/tmp/s1
          mkdir -p "$out"
          git worktree add --detach /tmp/s1-base "$CORE_BASE"
          git worktree add --detach /tmp/s1-head "$HEAD_SHA"
          run_one() {
            local dir=$1 label=$2 toolchain=$3
            local target="/tmp/target-s1-${label}-${toolchain//./_}"
            local log="$out/${label}-${toolchain}.log"
            (
              cd "$dir"
              CARGO_TARGET_DIR="$target" cargo "+$toolchain" bench \
                --manifest-path crates/mongreldb-query/Cargo.toml \
                --bench sql_cancellation -- sql_execution_control \
                --noplot --sample-size 30 --measurement-time 3 --warm-up-time 1
            ) 2>&1 | tee "$log"
            while IFS= read -r estimate; do
              bench=$(python3 - "$estimate" <<'PY'
          import pathlib, sys
          p=pathlib.Path(sys.argv[1]); parts=p.parts; i=parts.index('criterion')
          print('/'.join(parts[i+1:-2]))
          PY
              )
              jq -c --arg label "$label" --arg toolchain "$toolchain" --arg bench "$bench" \
                '{label:$label,toolchain:$toolchain,bench:$bench,mean_ns:.mean.point_estimate,median_ns:.median.point_estimate,slope_ns:(.slope.point_estimate // null)}' \
                "$estimate" >> "$out/summary.jsonl"
            done < <(find "$target/criterion/sql_execution_control" -path '*/new/estimates.json' | sort)
          }
          run_one /tmp/s1-base base "$RUST_OLD"
          run_one /tmp/s1-head head "$RUST_OLD"
          run_one /tmp/s1-head head "$RUST_NEW"
          cat "$out/summary.jsonl"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secondary-s1-sql-control
          path: /tmp/s1

  s3-s4-criterion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_NEW }}
      - uses: Swatinem/rust-cache@v2.9.1
      - run: rustup toolchain install "$RUST_OLD" --profile minimal
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler jq
      - shell: bash
        run: |
          set -euo pipefail
          out=/tmp/s3-s4
          mkdir -p "$out"
          git worktree add --detach /tmp/core-base "$CORE_BASE"
          git worktree add --detach /tmp/core-head "$HEAD_SHA"
          run_bench() {
            local dir=$1 label=$2 toolchain=$3 bench=$4 filter=$5 group=$6
            local target="/tmp/target-${bench}-${label}-${toolchain//./_}"
            local log="$out/${bench}-${label}-${toolchain}.log"
            (
              cd "$dir"
              CARGO_TARGET_DIR="$target" cargo "+$toolchain" bench -p mongreldb-core \
                --bench "$bench" -- "$filter" \
                --noplot --sample-size 30 --measurement-time 3 --warm-up-time 1
            ) 2>&1 | tee "$log"
            while IFS= read -r estimate; do
              name=$(python3 - "$estimate" <<'PY'
          import pathlib, sys
          p=pathlib.Path(sys.argv[1]); parts=p.parts; i=parts.index('criterion')
          print('/'.join(parts[i+1:-2]))
          PY
              )
              jq -c --arg label "$label" --arg toolchain "$toolchain" --arg bench "$name" \
                '{label:$label,toolchain:$toolchain,bench:$bench,mean_ns:.mean.point_estimate,median_ns:.median.point_estimate,slope_ns:(.slope.point_estimate // null)}' \
                "$estimate" >> "$out/summary.jsonl"
            done < <(find "$target/criterion/$group" -path '*/new/estimates.json' | sort)
          }
          for toolchain in "$RUST_OLD"; do
            run_bench /tmp/core-base base "$toolchain" trips trips/update_one_commit trips
            run_bench /tmp/core-base base "$toolchain" read_generation read_generation_1m/create read_generation_1m
          done
          for toolchain in "$RUST_OLD" "$RUST_NEW"; do
            run_bench /tmp/core-head head "$toolchain" trips trips/update_one_commit trips
            run_bench /tmp/core-head head "$toolchain" read_generation read_generation_1m/create read_generation_1m
          done
          cat "$out/summary.jsonl"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secondary-s3-s4-criterion
          path: /tmp/s3-s4

  s2-overlap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_NEW }}
      - uses: Swatinem/rust-cache@v2.9.1
      - run: rustup toolchain install "$RUST_OLD" --profile minimal
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - shell: bash
        run: |
          set -euo pipefail
          out=/tmp/s2
          mkdir -p "$out"
          git worktree add --detach /tmp/qual-base "$QUAL_BASE"
          git worktree add --detach /tmp/qual-head "$HEAD_SHA"
          run_one() {
            local dir=$1 label=$2 toolchain=$3
            local target="/tmp/target-s2-${label}-${toolchain//./_}"
            local log="$out/${label}-${toolchain}.log"
            for repetition in 1 2; do
              echo "=== repetition $repetition ===" | tee -a "$log"
              (
                cd "$dir"
                MONGRELDB_QUAL_ROWS=1000000 CARGO_TARGET_DIR="$target" \
                  cargo "+$toolchain" test -p mongreldb-core --test qualification --release \
                  overlapping_read_write_bounded_rss_and_commit_p99 -- --nocapture
              ) 2>&1 | tee -a "$log"
            done
            grep '"test":"overlapping_read_write"' "$log" > "$out/${label}-${toolchain}.jsonl" || true
          }
          run_one /tmp/qual-base base "$RUST_OLD"
          run_one /tmp/qual-head head "$RUST_OLD"
          run_one /tmp/qual-head head "$RUST_NEW"
          cat "$out"/*.jsonl
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secondary-s2-overlap
          path: /tmp/s2
