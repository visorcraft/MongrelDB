name: Bindings

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/bindings.yml"
      - "crates/mongreldb-node/**"
      - "crates/mongreldb-ffi/**"
      - "crates/mongreldb-kit-ffi/**"
      - "crates/mongreldb-jni/**"
      - "Cargo.toml"
      - "crates/mongreldb-core/src/**"
      - "crates/mongreldb-core/Cargo.toml"
      - "crates/mongreldb-core/build.rs"
      - "crates/mongreldb-query/src/**"
      - "crates/mongreldb-query/Cargo.toml"
      - "crates/mongreldb-query/build.rs"
      - "crates/mongreldb-types/src/**"
      - "crates/mongreldb-types/Cargo.toml"
      - "crates/mongreldb-log/src/**"
      - "crates/mongreldb-log/Cargo.toml"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/bindings.yml"
      - "crates/mongreldb-node/**"
      - "crates/mongreldb-ffi/**"
      - "crates/mongreldb-kit-ffi/**"
      - "crates/mongreldb-jni/**"
      - "Cargo.toml"
      - "crates/mongreldb-core/src/**"
      - "crates/mongreldb-core/Cargo.toml"
      - "crates/mongreldb-core/build.rs"
      - "crates/mongreldb-query/src/**"
      - "crates/mongreldb-query/Cargo.toml"
      - "crates/mongreldb-query/build.rs"
      - "crates/mongreldb-types/src/**"
      - "crates/mongreldb-types/Cargo.toml"
      - "crates/mongreldb-log/src/**"
      - "crates/mongreldb-log/Cargo.toml"

concurrency:
  group: bindings-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  RUST_VERSION: "1.97.1"

jobs:
  changes:
    name: Binding paths
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      node: ${{ steps.filter.outputs.node }}
      ffi: ${{ steps.filter.outputs.ffi }}
      kit_ffi: ${{ steps.filter.outputs.kit_ffi }}
      jni: ${{ steps.filter.outputs.jni }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shared:
              - ".github/workflows/bindings.yml"
              - "Cargo.toml"
              - "crates/mongreldb-core/src/**"
              - "crates/mongreldb-core/Cargo.toml"
              - "crates/mongreldb-core/build.rs"
              - "crates/mongreldb-query/src/**"
              - "crates/mongreldb-query/Cargo.toml"
              - "crates/mongreldb-query/build.rs"
              - "crates/mongreldb-types/src/**"
              - "crates/mongreldb-types/Cargo.toml"
              - "crates/mongreldb-log/src/**"
              - "crates/mongreldb-log/Cargo.toml"
            node:
              - "crates/mongreldb-node/**"
            ffi:
              - "crates/mongreldb-ffi/**"
            kit_ffi:
              - "crates/mongreldb-kit-ffi/**"
            jni:
              - "crates/mongreldb-jni/**"

  node:
    name: Node
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-node
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-node
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: npm test

  ffi:
    name: C FFI
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.ffi == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-ffi
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-ffi
      - run: cargo build --release
      - run: cargo test --release

  kit-ffi:
    name: Kit FFI
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.kit_ffi == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-kit-ffi
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-kit-ffi
      - run: cargo build --release
      - run: cargo test --release

  jni:
    name: JNI
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.jni == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mongreldb-jni
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/mongreldb-jni
      - run: cargo build --release
