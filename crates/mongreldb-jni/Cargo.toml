[package]
name = "mongreldb-jni"
version = "0.60.1"
edition = "2021"
publish = false
license = "MIT OR Apache-2.0"
description = "JNI shim for MongrelDB - in-process embedded engine for Java, Kotlin, and Scala"
repository = "https://github.com/visorcraft/MongrelDB"
keywords = ["mongreldb", "database", "jni", "java", "bindings"]
categories = ["database", "external-ffi-bindings"]

[lib]
# Lib name `mongreldb_jni` produces libmongreldb_jni.so / .dylib /
# mongreldb_jni.dll, loaded by the JVM via System.load().
name = "mongreldb_jni"
crate-type = ["cdylib"]

[dependencies]
# The Kit crate wraps the engine with schema model, migrations, and query
# builder execution. Path deps so JNI tracks monorepo engine fixes instead of
# a stale crates.io core pin (same approach as mongreldb-kit-ffi).
mongreldb-kit = { path = "../../../mongreldb-kit/crates/mongreldb-kit", version = "0.60.0" }
mongreldb-kit-core = { path = "../../../mongreldb-kit/crates/mongreldb-kit-core", version = "0.60.0" }
# The jni crate provides Rust bindings to the JNI API.
jni = { version = "0.21", features = ["invocation"] }
serde_json = { version = "1", features = ["preserve_order"] }

# Standalone crate - not a workspace member.
[workspace]

# Force Kit's transitive engine deps onto this monorepo's sources.
[patch.crates-io]
mongreldb-core = { path = "../mongreldb-core" }
mongreldb-query = { path = "../mongreldb-query" }
