[package]
name = "mongreldb-server"
version = "0.59.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "HTTP daemon for MongrelDB — serves SQL, native queries, and typed Kit API over HTTP for multi-process access."
repository = "https://github.com/visorcraft/MongrelDB"

[[bin]]
name = "mongreldb-server"
path = "src/main.rs"

[lib]
name = "mongreldb_server"
path = "src/lib.rs"

[dependencies]
mongreldb-core = { path = "../mongreldb-core", version = "0.59.0", features = ["encryption"] }
mongreldb-query = { path = "../mongreldb-query", version = "0.59.0" }
axum = "0.8"
tower = { version = "0.5", features = ["limit"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1"
arrow = "58"
futures = "0.3"
fs2 = "0.4"
hmac = "0.12"
sha2 = "0.10"
zeroize = "1"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = ["Win32_Foundation", "Win32_Storage_FileSystem"] }

[dev-dependencies]
tower = "0.5"
reqwest = { version = "0.12", features = ["json"] }
tempfile = "3"
mongreldb-client = { path = "../mongreldb-client", version = "0.59.0" }
datafusion = "54.0.0"

# Standalone crate — not a workspace member.
[workspace]
