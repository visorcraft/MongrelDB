[package]
name = "mongreldb-server"
version = "0.10.5"
edition = "2021"
publish = false

[[bin]]
name = "mongreldb-server"
path = "src/main.rs"

[dependencies]
mongreldb-core = { path = "../mongreldb-core", features = ["encryption"] }
mongreldb-query = { path = "../mongreldb-query" }
axum = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
arrow = "58"

# Standalone crate — not a workspace member.
[workspace]
