[package]
name = "mongreldb-server"
version = "0.28.0"
edition = "2021"
publish = false

[[bin]]
name = "mongreldb-server"
path = "src/main.rs"

[lib]
name = "mongreldb_server"
path = "src/lib.rs"

[dependencies]
mongreldb-core = { path = "../mongreldb-core", version = "0.28.0", features = ["encryption"] }
mongreldb-query = { path = "../mongreldb-query", version = "0.28.0" }
axum = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
arrow = "58"

[dev-dependencies]
tower = "0.5"
reqwest = { version = "0.12", features = ["json"] }
tempfile = "3"
mongreldb-client = { path = "../mongreldb-client" }
datafusion = "54.0.0"

# Standalone crate — not a workspace member.
[workspace]
