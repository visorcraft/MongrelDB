language = "C"
header = "/* Generated by cbindgen. Do NOT edit. */"
include_guard = "MONGRELDB_H"
includes = ["stdint.h", "stddef.h", "stdbool.h"]
sys_includes = ["stdint.h", "stddef.h", "stdbool.h"]
no_includes = false
documentation = true
documentation_style = "doxy"

[parse]
parse_deps = false
include = []

[export]
include = []
exclude = [
    "mongreldb_ffi::error::LastError",
    "mongreldb_ffi::transaction::StagedOp",
    "mongreldb_ffi::transaction::FFITransaction",
    "mongreldb_ffi::schema::SchemaBuilder",
    "mongreldb_ffi::schema::FFISchema",
    "mongreldb_ffi::query::FFIQuery",
    "mongreldb_ffi::table::FFITable",
    "mongreldb_ffi::table::FFIResult",
    "mongreldb_ffi::database::FFIDatabase",
]

[fn]
prefix = "mongreldb_"

[struct]
rename_fields = "None"

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"
