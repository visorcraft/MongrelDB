syntax = "proto3";

package mongreldb.v1;

import "common.proto";

service QueryService {
  rpc Prepare(PrepareRequest) returns (PrepareResponse);
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  rpc ExecuteStream(ExecuteRequest) returns (stream ArrowFrame);
  rpc CancelQuery(CancelQueryRequest) returns (Empty);
  rpc GetQueryStatus(GetQueryStatusRequest) returns (QueryStatusResponse);
}

message PrepareRequest {
  RequestContext context = 1;
  bytes session_id = 2;
  string sql = 3;
}

message PrepareResponse {
  uint64 statement_id = 1;
  uint64 schema_version = 2;
}

message ExecuteRequest {
  RequestContext context = 1;
  bytes session_id = 2;
  bytes query_id = 3;
  oneof command {
    string sql = 4;
    uint64 prepared_statement_id = 5;
    bytes admin_command = 6;
  }
  repeated bytes parameters = 7;
}

message ExecuteResponse {
  bytes query_id = 1;
  uint64 rows_affected = 2;
  repeated ArrowFrame frames = 3;
  bool idempotency_replayed = 4;
  bool committed = 5;
  uint64 commit_epoch = 6;
  bytes original_query_id = 7;
}

message CancelQueryRequest {
  RequestContext context = 1;
  bytes query_id = 2;
  bytes session_id = 3;
}

message GetQueryStatusRequest {
  RequestContext context = 1;
  bytes query_id = 2;
  bytes session_id = 3;
}

enum QueryPhase {
  QUERY_PHASE_UNSPECIFIED = 0;
  QUERY_PHASE_QUEUED = 1;
  QUERY_PHASE_PLANNING = 2;
  QUERY_PHASE_EXECUTING = 3;
  QUERY_PHASE_SERIALIZING = 4;
  QUERY_PHASE_COMPLETED = 5;
  QUERY_PHASE_FAILED = 6;
  QUERY_PHASE_CANCELLED = 7;
}

message QueryStatusResponse {
  bytes query_id = 1;
  QueryPhase phase = 2;
  ErrorDetail error = 3;
}
